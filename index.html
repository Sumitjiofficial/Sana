<!DOCTYPE html>  
<html lang="en">  
<head>  
    <meta charset="UTF-8">  
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">  
    <title>Birthday Surprise ✨</title>  
    
    <link href="https://fonts.googleapis.com/css2?family=Paprika&display=swap" rel="stylesheet">  

    <style>  
        /* =========================================
           GLOBAL STYLES & ANIMATED BACKGROUND
        ========================================= */
        *, *::before, *::after {
            box-sizing: border-box;
        }

        body {  
            margin: 0;  
            padding: 0;
            height: 100vh;  
            color: #333;  
            font-family: 'Paprika', cursive;  
            text-align: center;  
            overflow: hidden;  
            background: linear-gradient(-45deg, #ff9a9e, #fecfef, #a1c4fd, #c2e9fb);  
            background-size: 400% 400%;  
            animation: gradientBG 15s ease infinite;  
            display: flex;  
            justify-content: center;  
            align-items: center;  
            -webkit-tap-highlight-color: transparent;
        }  
        @keyframes gradientBG {  
            0% { background-position: 0% 50%; }  
            50% { background-position: 100% 50%; }  
            100% { background-position: 0% 50%; }  
        }  

        /* SCREEN CONTAINER */  
        .screen {  
            display: none;  
            flex-direction: column;  
            justify-content: center;  
            align-items: center;  
            width: 100%;  
            height: 100%;  
            position: absolute;  
            top: 0;  
            left: 0;  
            opacity: 0;  
            transition: opacity 0.5s ease-in-out, transform 0.5s ease-in-out;  
            transform: scale(0.95);  
        }  
        .screen.active {  
            display: flex;  
            opacity: 1;  
            transform: scale(1);  
        }  

        /* COMMON BUTTONS */  
        .btn-common {  
            padding: 15px 25px;  
            margin: 10px;  
            border: none;  
            border-radius: 50px;  
            background: linear-gradient(135deg, #ff6b81, #ff4fa1);  
            color: white;  
            font-size: 16px;  
            font-family: 'Paprika', cursive;  
            font-weight: 600;  
            cursor: pointer;  
            box-shadow: 0 4px 15px rgba(255, 107, 129, 0.4);  
            transition: transform 0.2s, box-shadow 0.2s;  
        }  
        .btn-common:hover, .btn-common:active {  
            transform: translateY(-3px) scale(1.05);  
            box-shadow: 0 8px 20px rgba(255, 107, 129, 0.6);  
        }  
        .btn-common.outline {  
            background: rgba(255, 255, 255, 0.8);  
            color: #ff4fa1;  
            border: 2px solid #ff4fa1;  
            box-shadow: none;  
        }  

        /* GLASSMORPHISM CARDS */  
        .glass-card {  
            background: rgba(255, 255, 255, 0.6);  
            backdrop-filter: blur(10px);  
            -webkit-backdrop-filter: blur(10px);  
            border: 1px solid rgba(255, 255, 255, 0.8);  
            border-radius: 30px;  
            padding: 40px 25px;  
            width: 85%;  
            box-sizing: border-box;
            max-width: 350px;  
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.1);  
        }  

        /* SCREEN 0-6 STYLES */  
        #screen-0 h2 { color: #fff; font-size: 32px; text-shadow: 2px 2px 4px rgba(0,0,0,0.2); }  
        .song-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 20px; }  
        #countdown { font-size: 35vw; color: #fff; text-shadow: 0 0 20px rgba(255,255,255,0.8); animation: pop 1s infinite; margin: 0; line-height: 1; }  
        #screen-1 .message { font-size: 8vw; color: #fff; }  
        @keyframes pop { 0% { transform: scale(0.8); opacity: 0; } 50% { transform: scale(1.2); opacity: 1; } 100% { transform: scale(1); opacity: 0; } }  
        .cat-gif { width: 250px; animation: bounce 2s infinite; border-radius: 20px; }  
        @keyframes bounce { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-15px); } }  
        .progress-container { width: 80%; max-width: 300px; height: 15px; background: rgba(255,255,255,0.5); border-radius: 20px; margin-top: 20px; overflow: hidden; box-shadow: inset 0 2px 5px rgba(0,0,0,0.1); }  
        #bar { height: 100%; width: 0%; background: linear-gradient(90deg, #ff9a9e, #ff6a88); border-radius: 20px; transition: width 0.1s linear; }  
        .top-badge { background: linear-gradient(90deg,#ff4fa1,#ff6fa5); color: white; padding: 6px 18px; font-size: 12px; border-radius: 20px; font-weight: bold; display: inline-block; margin-bottom: 15px; }  
        .gif-circle { width: 140px; height: 140px; margin: 0 auto 15px auto; border-radius: 50%; border: 6px solid white; overflow: hidden; box-shadow: 0 10px 20px rgba(255,105,180,0.3); background: white; }  
        .gif-circle img { width: 100%; height: 100%; object-fit: cover; }  
        .title { font-size: 28px; margin: 10px 0; color: #4b1c28; }  
        .title span { color: #ff4fa1; font-weight: normal; }  
        .msg { color: #555; font-size: 16px; line-height: 1.6; margin-bottom: 20px; }  
        .birthday-happy-gif { width: 250px; animation: bounce 2s infinite; border-radius: 20px; }  
        .special-text { font-size: 32px; color: #ff4fa1; text-shadow: 1px 1px 0 #fff; margin-bottom: 20px; }  
        #interactive-cake { transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275); cursor: pointer; }  
        #pressText { font-weight: 600; font-size: 18px; color: #555; margin: 15px 0; background: rgba(255,255,255,0.8); padding: 10px; border-radius: 15px; }  
        #screen-6 h1, .bday-header h1 { color: #ff4fa1; font-size: 40px; margin-bottom: 10px; text-shadow: 2px 2px 0px white; }  
        #confetti-canvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 100; }  

        /* ================= SCREEN 7 & 8 STYLES ================= */
        .bg-hearts { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 0; pointer-events: none; }
        .heart { position: absolute; font-size: 24px; color: #ffb3d9; opacity: 0.6; animation: floatUp 8s linear infinite; }
        @keyframes floatUp {
            0% { transform: translateY(100vh) scale(0.5); opacity: 0; }
            20% { opacity: 0.6; }
            80% { opacity: 0.6; }
            100% { transform: translateY(-10vh) scale(1.2); opacity: 0; }
        }

        .card-box { background: white; border-radius: 20px; padding: 30px 20px; width: 90%; max-width: 400px; box-sizing: border-box; box-shadow: 0 10px 30px rgba(255, 105, 180, 0.15); text-align: center; border: 2px solid #ffcce0; z-index: 10;}
        #loader-content { display: flex; flex-direction: column; align-items: center; gap: 15px; }
        #ready-content { display: none; flex-direction: column; align-items: center; gap: 15px; animation: fadeIn 1s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .card-box h2, .bday-header h2 { font-size: 22px; color: #ff3385; margin-bottom: 10px; }
        .card-box p { font-size: 16px; color: #ff66a3; line-height: 1.5; margin:0;}
        .emojis { font-size: 24px; letter-spacing: 5px; }
        
        .btn-special { background: linear-gradient(135deg, #ff66a3, #ff3385); color: white; border: none; padding: 12px 30px; border-radius: 30px; font-size: 18px; font-weight: bold; font-family: 'Paprika', cursive; cursor: pointer; box-shadow: 0 5px 15px rgba(255, 51, 133, 0.3); margin-top: 20px; display: flex; align-items: center; justify-content: center; gap: 10px; transition: transform 0.2s; z-index: 20;}
        .btn-special:hover, .btn-special:active { transform: translateY(-3px) scale(1.05); }

        /* Flip Card Scene */
        .scene { width: 280px; height: 280px; perspective: 600px; margin-bottom: 30px; cursor: pointer; z-index: 10;}
        .card-inner { width: 100%; height: 100%; position: relative; transition: transform 0.8s cubic-bezier(0.175, 0.885, 0.32, 1.275); transform-style: preserve-3d; }
        .scene.is-flipped .card-inner { transform: rotateY(180deg); }
        .card-face { position: absolute; width: 100%; height: 100%; -webkit-backface-visibility: hidden; backface-visibility: hidden; border-radius: 20px; display: flex; flex-direction: column; justify-content: center; align-items: center; padding: 20px; text-align: center; box-sizing: border-box; box-shadow: 0 10px 25px rgba(255, 51, 133, 0.2); }
        .card-front { background: linear-gradient(135deg, #ff9a9e 0%, #fecfef 99%, #fecfef 100%); color: white; border: 2px solid #fff; }
        .card-front h3 { font-size: 24px; margin-bottom: 15px; color: #fff; text-shadow: 1px 1px 3px rgba(0,0,0,0.1); }
        .card-front .icon { font-size: 50px; animation: cardbounce 2s infinite; }
        @keyframes cardbounce { 0%, 20%, 50%, 80%, 100% {transform: translateY(0);} 40% {transform: translateY(-15px);} 60% {transform: translateY(-7px);} }
        .card-back { background: white; transform: rotateY(180deg); border: 2px dashed #ff66a3; color: #ff3385; padding: 25px; }
        .card-back p { font-size: 15px; line-height: 1.6; margin-bottom: 10px; color: #d6336c; }
        
        .bottom-text { text-align: center; font-size: 15px; color: #e64980; padding: 0 10px; line-height: 1.5; font-weight: 500; z-index: 10; max-width: 400px;}
        .dots { font-size: 30px; color: #ff99c2; letter-spacing: 2px; animation: blink 1.5s infinite; }
        @keyframes blink { 0% { opacity: 0.2; } 50% { opacity: 1; } 100% { opacity: 0.2; } }


        /* =========================================
           SAM.HTML (SCREEN 9) MERGED LOGIC
        ========================================= */

        function goToSamScreen() {
            
            
            // Hide hearts background and other visual clutters
            document.getElementById('bg-hearts').style.display = 'none';

            // Transition to the final dark screen
            transitionScreen('screen-8', 'screen-9');

            // Initial dramatic delay
            setTimeout(() => {
                const btnLights = document.getElementById('btn-lights');
                btnLights.style.display = 'block';
                setTimeout(() => btnLights.classList.add('visible'), 50);
            }, 2500); 
        }

        const timelineMessages = [
            "TODAY IS...", "AS BEAUTIFUL AS OTHER DAYS", "BUT YOU REALIZE", "ANOTHER YEAR HAS GONE",
            "IN A BLINK OF THE EYES", "HOWEVER", "DO YOU KNOW..?", "TODAY IS JUST SPECIAL", "SO SPECIAL TO YOU",
            "THAT'S WHY", "LET'S MAKE IT...", "THE BEST CELEBRATION EVER", "AND LET ME SHARE...", "A PIECE OF HAPPINESS TO YOU",
            "I MADE ALL THIS...", "AS A BIRTHDAY PRESENT TO YOU", "THANKS FOR BEING THERE", "THANKS FOR THE FRIENDSHIP WE MADE",
            "THANKS FOR EVERYTHING", "I WISH YOU ALL THE BEST", "MAY YOUR LIFE BE AT EASE", "MAY ALL YOUR WISHES COME TRUE",
            "REMEMBER", "YOUR AMBITIONS", "YOU LIVE AS A FREE BIRD...", "FLYING IN THE BLUE SKY", "NOW THINGS ARE DIFFERENT...",
            "REAL STORY OF YOUR LIFE", "IS JUST ABOUT TO BEGIN", "INDEED..", "THIS LIFE IS NOT EASY AS WE THOUGHT",
            "BUT...", "DON'T WORRY", "DON'T BE AFRAID", "BECAUSE...", "YOU ARE NOT ALONE IN THIS WORLD",
            "BECAUSE...", "THIS YEAR WILL BE BETTER", "AND I HOPE", "YOU'LL FIND...", "HAPPINESS ALONG THE WAY",
            "KEEP YOUR SPIRITS UP", "ENJOY EVERY SINGLE MOMENT...", "THAT YOU EXPERIENCE TODAY",
            "FILL IT WITH YOUR MOST BEAUTIFUL SMILE", "AND MAKE IT THE BEST MEMORY..", "LASTLY...",
            "I'D LIKE TO WISH YOU ONE MORE TIME", "A VERY HAPPY BIRTHDAY"
        ];

        // Button Elements
        const btnLights = document.getElementById('btn-lights');
        const btnMusic = document.getElementById('btn-music');
        const btnDecorate = document.getElementById('btn-decorate');
        const btnBalloons = document.getElementById('btn-balloons');
        const btnCake = document.getElementById('btn-cake');
        const btnCandle = document.getElementById('btn-candle');
        const btnHappy = document.getElementById('btn-happy');

        function switchBtn(hideBtn, showBtn) {
            hideBtn.classList.remove('visible');
            setTimeout(() => {
                hideBtn.style.display = 'none';
                if(showBtn) {
                    showBtn.style.display = 'block';
                    setTimeout(() => showBtn.classList.add('visible'), 50);
                }
            }, 500);
        }

        btnLights.addEventListener('click', () => {
            document.getElementById('screen-9').classList.add('lights-on');
            document.getElementById('stars-canvas').classList.add('active');
            document.getElementById('row1').classList.add('active');
            document.getElementById('row2').classList.add('active');
            document.getElementById('sparkles').classList.add('active');
            switchBtn(btnLights, btnMusic);
        });

        btnMusic.addEventListener('click', () => {
            const audio = document.getElementById('bday-audio.mp3');
            audio.play().catch(e => console.log("Audio play prevented or no src provided."));
            switchBtn(btnMusic, btnDecorate);
        });

        btnDecorate.addEventListener('click', () => {
            document.getElementById('bunting-zone').classList.add('active');
            switchBtn(btnDecorate, btnBalloons);
        });

        btnBalloons.addEventListener('click', () => {
            document.getElementById('balloon-zone').classList.add('active');
            switchBtn(btnBalloons, btnCake);
        });

        btnCake.addEventListener('click', () => {
            document.getElementById('cake-wrap').classList.add('active');
            switchBtn(btnCake, btnCandle);
        });

        btnCandle.addEventListener('click', () => {
            document.getElementById('candle').classList.add('active');
            switchBtn(btnCandle, btnHappy);
        });

        btnHappy.addEventListener('click', () => {
            switchBtn(btnHappy, null);
            startStorySequence();
        });

        async function startStorySequence() {
            const textEl = document.getElementById('dynamic-text');
            const delay = ms => new Promise(res => setTimeout(res, ms));

            for (let i = 0; i < timelineMessages.length; i++) {
                textEl.innerText = timelineMessages[i];
                textEl.classList.add('show');
                await delay(2500); 
                textEl.classList.remove('show');
                await delay(1000); 
            }
            samConfetti(); 
        }

        // STARS CANVAS
        const samCanvas = document.getElementById('stars-canvas');
        const samCtx = samCanvas.getContext('2d');
        let stars = [];

        function resizeSam(){
            samCanvas.width = innerWidth;
            samCanvas.height = innerHeight;
            stars = [];
            for(let i=0; i<140; i++){
                stars.push({
                    x: Math.random() * samCanvas.width, y: Math.random() * samCanvas.height,
                    r: Math.random() * 1.8, o: Math.random(), d: (Math.random() * .02) + .003
                });
            }
        }

        function animateStars(){
            samCtx.clearRect(0, 0, samCanvas.width, samCanvas.height);
            stars.forEach(s => {
                samCtx.beginPath();
                samCtx.arc(s.x, s.y, s.r, 0, Math.PI*2);
                samCtx.fillStyle = `rgba(255,255,255,${s.o})`;
                samCtx.fill();
                s.o += s.d;
                if(s.o >= 1 || s.o <= .1) s.d *= -1;
            });
            requestAnimationFrame(animateStars);
        }

        resizeSam();
        animateStars();
        window.addEventListener('resize', resizeSam);

        // LIGHTS
        const lightColors = ['red', 'yellow', 'blue', 'green', 'pink', 'orange'];
        function createLights(id){
            const row = document.getElementById(id);
            const wire = document.createElement('div');
            wire.className = 'wire';
            row.appendChild(wire);

            for(let i=0; i<7; i++){
                const wrap = document.createElement('div');
                wrap.className = 'bulb-wrap';
                wrap.style.left = `${(i+.5)*(100/7)}%`;
                
                const cap = document.createElement('div');
                cap.className = 'cap';
                const bulb = document.createElement('div');
                bulb.className = `bulb ${lightColors[i%lightColors.length]}`;
                
                wrap.appendChild(cap);
                wrap.appendChild(bulb);
                row.appendChild(wrap);
            }
        }
        createLights('row1');
        createLights('row2');

        // SPARKLES
        samSparkles = document.getElementById('sparkles');
        const sparkleColors = ['#fff', '#ffd93d', '#ff78d2', '#57a8ff', '#4de46b', '#ffa43b'];
        for(let i=0; i<36; i++){
            const s = document.createElement('div');
            s.className = 'spark';
            s.style.left = Math.random()*100+'%';
            s.style.top = Math.random()*100+'%';
            s.style.background = sparkleColors[Math.floor(Math.random()*sparkleColors.length)];
            s.style.animationDelay = `${Math.random()*3}s`;
            samSparkles.appendChild(s);
        }

        // SAM CONFETTI
        function samConfetti(){
            for(let i=0; i<140; i++){
                const c = document.createElement('div');
                c.className = 'sam-confetti';
                c.style.left = Math.random()*100+'%';
                c.style.top = '-20px';
                c.style.background = `hsl(${Math.random()*360},100%,60%)`;
                c.style.transform = `rotate(${Math.random()*360}deg)`;
                c.style.transition = `${4+Math.random()*3}s linear`;
                
                document.getElementById('screen-9').appendChild(c);
                
                setTimeout(() => {
                    c.style.top='110%';
                    c.style.transform = `translateX(${(Math.random()-.5)*300}px) rotate(${Math.random()*720}deg)`;
                }, 50);
                
                setTimeout(() => c.remove(), 7000);
            }
        }
    </script>
</body>  
</html>
